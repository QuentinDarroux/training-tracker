name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Works around a real npm bug (npm/cli#4028, "Exit handler never
        # called!") seen on this runner's npm 10.8.2: npm ci can crash
        # mid-install while still exiting 0. The crash can leave package
        # *folders* present but with truncated/missing files inside
        # (e.g. missing package.json for @types/react), so a plain
        # directory-existence check is not enough — verify with Node's
        # own require.resolve() against each package's package.json,
        # and prefer `npm install` over `npm ci` since the community
        # reports the ci-specific pruning step triggers this race more.
        run: |
          set +e
          success=0
          for attempt in 1 2 3; do
            echo "Install attempt $attempt"
            rm -rf node_modules
            npm install --no-audit --no-fund
            node -e "
              const mods = ['react','react-dom','react-router-dom','vite','typescript',
                '@types/react','@types/react-dom','vite-plugin-pwa','idb','recharts',
                'workbox-core','workbox-precaching','@vitejs/plugin-react'];
              let ok = true;
              for (const m of mods) {
                try { require.resolve(m + '/package.json'); }
                catch (e) { console.error('MISSING:', m); ok = false; }
              }
              process.exit(ok ? 0 : 1);
            "
            if [ $? -eq 0 ]; then
              echo "Dependencies verified present."
              success=1
              break
            fi
            echo "Dependencies missing/incomplete after attempt $attempt, retrying..."
          done
          set -e
          if [ "$success" != "1" ]; then
            echo "::error::Failed to install a complete node_modules after 3 attempts"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
