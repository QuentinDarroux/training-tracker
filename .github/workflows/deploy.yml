name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Force the public npm registry: this GitHub Actions runner can
        # inherit an organization-level npm registry override (pointing
        # at an internal corporate Artifactory mirror), which isn't
        # reachable from GitHub-hosted runners and causes every package
        # fetch to fail with ENOTFOUND (surfacing as npm's misleading
        # "Exit handler never called!" error). This is a public repo
        # depending only on public npm packages, so pin the registry
        # explicitly regardless of any inherited config.
        run: npm ci
        env:
          npm_config_registry: https://registry.npmjs.org/

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
