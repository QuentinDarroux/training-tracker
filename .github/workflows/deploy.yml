name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Works around a real npm bug (npm/cli#4028, "Exit handler never
        # called!") seen on this runner's npm 10.8.2: npm ci can crash
        # mid-install (truncating node_modules) while still exiting 0,
        # so `npm ci || npm ci` never retries. Instead, verify a few key
        # packages actually landed on disk and retry based on that, not
        # npm's own exit code.
        run: |
          set +e
          success=0
          for attempt in 1 2 3; do
            echo "Install attempt $attempt"
            rm -rf node_modules
            npm ci --no-audit --no-fund
            if [ -d node_modules/react ] && [ -d node_modules/typescript ] && [ -d node_modules/vite ]; then
              echo "Dependencies verified present."
              success=1
              break
            fi
            echo "Dependencies missing/incomplete after attempt $attempt, retrying..."
          done
          set -e
          if [ "$success" != "1" ]; then
            echo "::error::Failed to install a complete node_modules after 3 attempts"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
